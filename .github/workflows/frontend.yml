name: Deploy Frontend desde ECR

on:
  push:
    branches: [ "main" ]
    paths:
      - 'front_despacho/**'
      - '.github/workflows/frontend.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} # Requerido para AWS Academy
        aws-region: us-east-1

    - name: Autenticar en AWS ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Construir y Subir Imagen a ECR
      env:
        ECR_REGISTRY: 572392556337.dkr.ecr.us-east-1.amazonaws.com
        ECR_REPOSITORY: proyectosemestral-frontend
        IMAGE_TAG: v1
        # Aquí inyectas la IP pública de tu backend para que Vite la use al compilar
        VITE_API_URL: http://${{ secrets.EC2_FRONTEND_IP }}:8080 
      run: |
        docker build \
          --build-arg VITE_API_URL=$VITE_API_URL \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          ./front_despacho
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Desplegar en EC2 pública mediante SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_FRONTEND_IP }}
        username: ec2-user
        key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
        script: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 572392556337.dkr.ecr.us-east-1.amazonaws.com
          docker pull 572392556337.dkr.ecr.us-east-1.amazonaws.com/proyectosemestral-frontend:v1
          docker stop proyectosemestral-frontend || true
          docker rm proyectosemestral-frontend || true
          docker run -d -p 80:80 --name proyectosemestral-frontend 572392556337.dkr.ecr.us-east-1.amazonaws.com/proyectosemestral-frontend:v1