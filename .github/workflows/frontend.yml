name: CI/CD Frontend

on:
  push:
    branches: [ "main" ]
    # Asegúrate de que esta carpeta coincida con tu repositorio
    paths:
      - 'proyectosemestral-frontend/**' 

env:
  AWS_REGION: us-east-1
  CONTAINER_NAME: front-despacho-container

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Autenticar en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Compilar y Subir Imagen a ECR (URI Estática)
      run: |
        # Compilar usando la ruta estática de tu ECR
        docker build -t 572392556337.dkr.ecr.us-east-1.amazonaws.com/proyectosemestral-frontend:latest ./proyectosemestral-frontend
        
        # Subir la imagen
        docker push 572392556337.dkr.ecr.us-east-1.amazonaws.com/proyectosemestral-frontend:latest

    - name: Desplegar en EC2 pública mediante SSH (URI Estática)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_FRONTEND_IP }}
        username: ec2-user
        key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
        script: |
          # Autenticar Docker dentro de la EC2
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 572392556337.dkr.ecr.us-east-1.amazonaws.com
          
          # Descargar la nueva imagen
          docker pull 572392556337.dkr.ecr.us-east-1.amazonaws.com/proyectosemestral-frontend:latest
          
          # Limpiar contenedor antiguo si existe
          docker stop front-despacho-container || true
          docker rm front-despacho-container || true
          
          # Correr el nuevo contenedor
          docker run -d -p 80:80 --name front-despacho-container 572392556337.dkr.ecr.us-east-1.amazonaws.com/proyectosemestral-frontend:latest